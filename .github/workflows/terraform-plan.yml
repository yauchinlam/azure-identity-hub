# Plan only on pull requests — apply runs on merge to main (terraform.yml).

name: Terraform Plan

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-plan-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: Terraform (plan)
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      TF_VAR_location: ${{ secrets.AZURE_LOCATION }}
      TF_VAR_github_owner: ${{ secrets.TF_VAR_github_owner }}
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate hub secrets
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_LOCATION: ${{ secrets.AZURE_LOCATION }}
          TF_VAR_github_owner: ${{ secrets.TF_VAR_github_owner }}
          HUB_SETTINGS_TFVARS: ${{ secrets.HUB_SETTINGS_TFVARS }}
          REPO_SECRET_SYNC_TOKEN: ${{ secrets.REPO_SECRET_SYNC_TOKEN }}
        run: bash ../../scripts/validate-hub-secrets.sh github_repos.tfvars.json

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.5

      - name: Write hub settings
        env:
          HUB_SETTINGS_TFVARS: ${{ secrets.HUB_SETTINGS_TFVARS }}
        run: |
          if [ -z "$HUB_SETTINGS_TFVARS" ]; then
            echo "Missing HUB_SETTINGS_TFVARS secret."
            exit 1
          fi
          printf '%s\n' "$HUB_SETTINGS_TFVARS" > hub_settings.tfvars.json

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -var-file=hub_settings.tfvars.json -var-file=github_repos.tfvars.json -no-color
